name: Secure CI Pipeline
on:
  push:
    branches: ["main"]
jobs:
  build-scan-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run:  |
          trivy image secure-app:v1

      - name: Tag Image
        run: |
          docker tag secure-app:v1192.168.56.100/5000/secure-app:v1
      - name: Push to Private Registry
        run: |
          docker push 192.168.56.100:5000/secure-app:v1
