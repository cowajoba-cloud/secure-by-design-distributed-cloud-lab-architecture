name: Secure CI CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: self-hosted

    steps:
      - name: Check Docker
        run: docker ps

      - name: Build Image
        run: docker build -t secure-app:v1 /home/charlie/secure-by-design-distributed-cloud-lab-architecture/docker/secure-app

      - name: Tag Image
        run: docker tag secure-app:v1 192.168.56.100:5000/secure-app:v1

      - name: Push Image
        run: docker push 192.168.56.100:5000/secure-app:v1

      - name: Validate Registry
        run: curl -k https://192.168.56.100:5000/v2/_catalog
EOF
